name: Publish Plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Read plugin version from release tag
        id: version
        run: |
          VERSION="$GITHUB_REF_NAME"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          sed -i "s/<h3>Unreleased<\/h3>/<h3>$VERSION<\/h3>/" src/main/resources/META-INF/plugin.xml
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish signed plugin to JetBrains Marketplace
        run: ./gradlew publishPlugin -PpluginVersion="${{ steps.version.outputs.version }}"
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
